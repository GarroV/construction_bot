services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    labels:
      backup.pgdump: "true"          # автобэкап MUSPELHEIM (§11)
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: botdb
    volumes: ["pgdata:/var/lib/postgresql/data"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d botdb"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
